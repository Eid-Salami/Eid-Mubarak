<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Salami - Digital Card</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary-gold: #FFD700;
            --deep-royal: #0f0c29;
            --gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Hind Siliguri', sans-serif;
        }

        body {
            background: var(--gradient);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
            overflow-x: hidden;
        }

        /* Animated Background Stars */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            animation: fadeIn 1s ease-out;
        }

        /* Banner Design */
        .eid-banner {
            width: 100%;
            height: 180px;
            background: url('https://img.freepik.com/free-vector/eid-mubarak-greeting-card-with-mosque-crescent-moon_1017-31302.jpg?w=800') center/cover;
            border-radius: 15px;
            margin-bottom: 20px;
            position: relative;
            border: 2px solid var(--primary-gold);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .eid-banner::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
        }

        .eid-text-anim {
            z-index: 1;
            font-size: 32px;
            font-weight: 700;
            color: var(--primary-gold);
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            animation: pulse 2s infinite ease-in-out;
        }

        .title {
            font-size: 24px;
            margin-bottom: 20px;
            color: #fff;
        }

        .title span {
            color: var(--primary-gold);
        }

        /* Form Styling */
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: var(--primary-gold);
            margin-left: 5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            background: rgba(0,0,0,0.2);
            color: white;
            font-size: 15px;
            transition: 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary-gold);
            background: rgba(0,0,0,0.4);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s transform, 0.3s box-shadow;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:active { transform: scale(0.98); }

        .btn-generate {
            background: linear-gradient(45deg, #FFD700, #FFA500);
            color: #000;
        }

        .btn-whatsapp { background: #25D366; color: white; }
        .btn-copy { background: #6c5ce7; color: white; }

        /* Result Card */
        .salami-card {
            background: rgba(255, 215, 0, 0.1);
            border: 1px dashed var(--primary-gold);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .number-display {
            font-size: 24px;
            color: var(--primary-gold);
            font-weight: bold;
            margin: 10px 0;
            letter-spacing: 2px;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .link-box {
            background: #000;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            margin-top: 15px;
            word-break: break-all;
            opacity: 0.8;
        }

    </style>
</head>

<body>

    <div class="stars-container" id="stars"></div>

    <div class="container" id="mainContainer">
        <!-- Professional Banner -->
        <div class="eid-banner">
            <div class="eid-text-anim">Eid Mubarak</div>
        </div>

        <div id="contentArea">
            <div class="title">🌙 ইদ সালামি <span>লিঙ্ক জেনারেটর</span></div>
            
            <div class="input-group">
                <label>আপনার নাম</label>
                <input id="name" type="text" placeholder="যেমন: আরিয়ান আহমেদ">
            </div>

            <div class="input-group">
                <label>পেমেন্ট মেথড</label>
                <select id="method">
                    <option value="bKash Personal">bKash (Personal)</option>
                    <option value="Nagad Personal">Nagad (Personal)</option>
                    <option value="Rocket">Rocket</option>
                </select>
            </div>

            <div class="input-group">
                <label>নাম্বার</label>
                <input id="number" type="number" placeholder="017xxxxxxxx">
            </div>

            <div class="input-group">
                <label>সালামি মেসেজ</label>
                <textarea id="customMsg" placeholder="সালামি না দিলে কিন্তু দাওয়াত নাই! 😜"></textarea>
            </div>

            <button class="btn btn-generate" onclick="generateLink()">
                ✨ ম্যাজিক লিঙ্ক তৈরি করুন
            </button>
        </div>

        <div id="resultArea" style="display: none;">
            <!-- Result will be injected here -->
        </div>
    </div>

<script>
    // Create subtle animated stars
    function createStars() {
        const container = document.getElementById('stars');
        for (let i = 0; i < 50; i++) {
            const star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.width = '2px';
            star.style.height = '2px';
            star.style.background = 'white';
            star.style.borderRadius = '50%';
            star.style.opacity = Math.random();
            star.style.animation = `pulse ${Math.random() * 3 + 2}s infinite`;
            container.appendChild(star);
        }
    }
    createStars();

    let generatedUrl = "";

    function generateLink() {
        const name = document.getElementById("name").value.trim();
        const method = document.getElementById("method").value;
        const number = document.getElementById("number").value.trim();
        const msg = document.getElementById("customMsg").value.trim() || "ঈদ মোবারক! সালামি পাঠাতে ভুলবেন না কিন্তু।";

        if (!name || !number) {
            alert("দয়া করে নাম এবং নাম্বার সঠিক ভাবে দিন!");
            return;
        }

        const data = btoa(unescape(encodeURIComponent(`${name}|${method}|${number}|${msg}`)));
        generatedUrl = window.location.origin + window.location.pathname + "?salami=" + data;

        document.getElementById("contentArea").style.display = "none";
        const resultArea = document.getElementById("resultArea");
        resultArea.style.display = "block";
        
        resultArea.innerHTML = `
            <div class="salami-card">
                <p>অভিনন্দন! আপনার লিঙ্ক তৈরি হয়েছে।</p>
                <div class="link-box">${generatedUrl}</div>
            </div>
            
            <button class="btn btn-copy" onclick="copyToClipboard()">📋 লিঙ্ক কপি করুন</button>
            <button class="btn btn-whatsapp" onclick="shareWA()">🟢 হোয়াটসঅ্যাপে পাঠান</button>
            <button class="btn btn-generate" style="background:#555; color:white;" onclick="location.reload()">🔄 নতুন করে তৈরি করুন</button>
        `;

        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 },
            colors: ['#FFD700', '#ffffff', '#FFA500']
        });
    }

    function copyToClipboard() {
        navigator.clipboard.writeText(generatedUrl);
        alert("লিঙ্কটি কপি করা হয়েছে! এখন বন্ধুকে পাঠান। ✅");
    }

    function shareWA() {
        const text = `🌙 ঈদ মোবারক!\n\nসালামি না দিলে কিন্তু বন্ধুত্ব শেষ! 😜\nসালামি পাঠানোর লিঙ্ক: ${generatedUrl}`;
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    // Load Reciever View
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const salamiData = urlParams.get('salami');

        if (salamiData) {
            try {
                const decodedData = decodeURIComponent(escape(atob(salamiData)));
                const [name, method, number, msg] = decodedData.split('|');

                document.getElementById("contentArea").style.display = "none";
                const resultArea = document.getElementById("resultArea");
                resultArea.style.display = "block";

                resultArea.innerHTML = `
                    <h2 style="color:var(--primary-gold); margin-bottom:10px;">${name} এর পক্ষ থেকে</h2>
                    <p style="font-style: italic; margin-bottom:20px;">"${msg}"</p>
                    
                    <div class="salami-card">
                        <p style="font-size:14px">সালামি পাঠানোর মাধ্যম</p>
                        <h3 style="margin:5px 0;">${method}</h3>
                        <div class="number-display">${number}</div>
                    </div>

                    <button class="btn btn-generate" onclick="window.location.href=window.location.pathname">
                        🎁 আপনিও সালামি লিঙ্ক বানান
                    </button>
                `;
                
                // Celebration for the receiver
                setTimeout(() => {
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 }
                    });
                }, 500);

            } catch (e) {
                console.error("Data error");
            }
        }
    };
</script>

</body>
</html>
