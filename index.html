<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<title>Eid Salami Generator</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Hind Siliguri',sans-serif;
background:url('https://i.imgur.com/dW01cIv.jpg');
background-size:cover;
background-attachment:fixed;
margin:0;
text-align:center;
color:white;
}

.overlay{
background:rgba(0,0,0,0.6);
min-height:100vh;
padding:30px;
}

h1{
font-size:40px;
color:#FFD700;
animation: glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px gold;}
to{text-shadow:0 0 25px orange;}
}

.form-box{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:15px;
max-width:500px;
margin:auto;
backdrop-filter:blur(10px);
}

input,select,textarea{
width:90%;
padding:10px;
margin:10px;
border:none;
border-radius:8px;
}

button{
background:#FFD700;
color:black;
padding:12px 25px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:orange;
}

.link-box{
margin-top:20px;
background:white;
color:black;
padding:10px;
border-radius:10px;
word-break:break-all;
}

.share{
margin-top:10px;
}

</style>
</head>

<body>

<div class="overlay">

<h1>🌙 Eid Mubarak 🌙</h1>

<div class="form-box">

<input id="name" placeholder="আপনার নাম">

<input type="file" id="selfie">

<select id="method">
<option value="bkash">Bkash Personal</option>
<option value="nagad">Nagad Personal</option>
</select>

<input id="number" placeholder="Bkash / Nagad Number">

<select id="msgSelect">
<option>ঈদের সালামি না দিলে কিন্তু মন খারাপ করবো 😜</option>
<option>আজ ঈদ! সালামি দিলে দোয়া ফ্রি 🤲</option>
<option>ঈদের খুশি বাড়াতে ছোট্ট একটা সালামি পাঠাতে পারেন 😉</option>
<option>সালামি দিলে ঈদের আনন্দ দ্বিগুণ হবে 🎉</option>
<option>আপনার সালামি আমার ঈদের সুখ 😍</option>
</select>

<textarea id="customMsg" placeholder="নিজের Eid Mubarak Message লিখতে পারেন"></textarea>

<button onclick="generate()">Link Generate</button>

</div>

<div id="result"></div>

</div>


<script>

function generate(){

let name=document.getElementById("name").value
let number=document.getElementById("number").value
let method=document.getElementById("method").value
let msg=document.getElementById("customMsg").value || document.getElementById("msgSelect").value

let data=btoa(name+"|"+number+"|"+method+"|"+msg)

let link=location.href.split("?")[0]+"?data="+data

document.getElementById("result").innerHTML=`

<div class="link-box">

<b>আপনার Eid Salami Link</b><br><br>

<input value="${link}" id="linkInput" style="width:90%">

<br><br>

<button onclick="copy()">Copy Link</button>

<div class="share">

<a href="https://m.me/?link=${link}" target="_blank">Messenger</a> |
<a href="https://wa.me/?text=${link}" target="_blank">WhatsApp</a>

</div>

</div>

`

}

function copy(){
let copyText=document.getElementById("linkInput")
copyText.select()
document.execCommand("copy")
alert("Link Copied")
}

</script>


<script src="https://sturgeonvelocity.com/90/73/c2/9073c2631c16eaba32648763f413d0d2.js"></script>

<script async="async" data-cfasync="false" src="https://sturgeonvelocity.com/b5662ff1d1603e73ba82848872d95bbc/invoke.js"></script>

<div id="container-b5662ff1d1603e73ba82848872d95bbc"></div>


</body>
</html>
