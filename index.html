<style>

<body>

<div class="formbox">

<input type="file" id="selfie">

<select id="method">
<option value="Bkash">Bkash Personal</option>
<option value="Nagad">Nagad Personal</option>
</select>

<input id="number" placeholder="Bkash / Nagad Number">

<select id="messageSelect"></select>

<textarea id="customMsg" placeholder="নিজের মেসেজ লিখতে চাইলে এখানে লিখুন"></textarea>

<button onclick="generateLink()">🎁 Link Generate</button>

<div class="result" id="result" style="display:none">

<p id="showLink"></p>

<button class="copybtn" onclick="copyLink()">📋 Copy Link</button>

<div class="share">
<a id="messenger" target="_blank">Messenger</a> |
<a id="whatsapp" target="_blank">WhatsApp</a>
</div>

</div>

</div>

<script>

];

let select=document.getElementById("messageSelect");

funnyMessages.forEach(m=>{
let opt=document.createElement("option");
opt.text=m;
select.add(opt);
});

function generateLink(){

let name=document.getElementById("name").value;
let number=document.getElementById("number").value;
let method=document.getElementById("method").value;

let msg=document.getElementById("customMsg").value || select.value;

let data=btoa(name+"|"+number+"|"+method+"|"+msg);

let link=location.href.split("?")[0]+"?data="+data;

document.getElementById("result").style.display="block";

document.getElementById("showLink").innerText=link;

document.getElementById("messenger").href="https://m.me/?link="+link;

document.getElementById("whatsapp").href="https://wa.me/?text="+link;

}

function copyLink(){

let text=document.getElementById("showLink").innerText;

navigator.clipboard.writeText(text);

alert("Link Copied");

}

</script>
