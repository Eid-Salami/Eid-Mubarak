<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Salami - ঈদ মোবারক!</title>
    
    <meta property="og:title" content="আমার ঈদের সালামি কই? 😍">
    <meta property="og:description" content="ঈদের আনন্দ ভাগাভাগি করি, সালামি দিন এখনই!">
    <meta property="og:image" content="https://i.imgur.com/dW01cIv.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.6.0/confetti.browser.min.js"></script>

    <style>
        body {
            font-family: 'Hind Siliguri', sans-serif;
            /* Fixed Background Image Link */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://i.imgur.com/dW01cIv.jpg') no-repeat center center fixed;
            background-size: cover;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .lantern {
            position: absolute;
            width: 45px;
            animation: float 5s ease-in-out infinite;
            filter: drop-shadow(0 0 10px gold);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50% { transform: translateY(-25px) rotate(5deg); }
        }

        .moon-glow {
            filter: drop-shadow(0 0 20px #fff);
            animation: moonPulse 4s infinite alternate;
        }
        @keyframes moonPulse {
            from { opacity: 0.7; transform: scale(1); }
            to { opacity: 1; transform: scale(1.1); }
        }

        .btn-gradient {
            background: linear-gradient(135deg, #FFD700, #FF8C00);
            transition: 0.4s;
        }
        .btn-gradient:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 20px rgba(255, 140, 0, 0.4);
        }

        .hidden-section { display: none; }
    </style>
</head>
<body class="min-h-screen text-gray-800">

    <div class="fixed inset-0 pointer-events-none z-0">
        <img src="https://www.svgrepo.com/show/295557/crescent-moon.svg" class="absolute top-8 right-8 w-20 moon-glow">
        <img src="https://www.svgrepo.com/show/164947/lantern.svg" class="lantern top-24 left-6">
        <img src="https://www.svgrepo.com/show/164947/lantern.svg" class="lantern bottom-24 right-6" style="animation-delay: 2s;">
    </div>

    <div class="flex justify-center py-4 relative z-10">
        <script src="https://sturgeonvelocity.com/90/73/c2/9073c2631c16eaba32648763f413d0d2.js"></script>
    </div>

    <div class="max-w-md mx-auto p-4 relative z-10">
        
        <div class="text-center mb-6">
            <div class="inline-block bg-yellow-400 text-black px-6 py-2 rounded-full font-bold shadow-lg mb-2">
                🌙 ঈদ মোবারক!
            </div>
            <h1 class="text-3xl font-extrabold text-white drop-shadow-lg">আমার সালামি কই? 🎁</h1>
        </div>

        <div id="generatorSection" class="glass-card p-6">
            <div class="text-center mb-5 border-b pb-4">
                <p class="text-lg font-medium text-pink-600">
                    আজ ঈদের দিন 😍 সালামি নিন ❤️<br>
                    <span class="text-sm text-gray-500 italic">সালামি না দিলে কিন্তু কফি খাওয়াবো না 😜</span>
                </p>
            </div>

            <form id="salamiForm" class="space-y-4">
                <input type="text" id="userName" required class="w-full p-3 rounded-xl border-2 border-yellow-200 outline-none focus:border-yellow-500" placeholder="আপনার নাম লিখুন">
                
                <input type="url" id="userPhoto" class="w-full p-3 rounded-xl border-2 border-yellow-200 outline-none focus:border-yellow-500" placeholder="ফটো লিংক (ঐচ্ছিক)">

                <div class="flex gap-2">
                    <select id="paymentType" class="w-1/3 p-3 rounded-xl border-2 border-yellow-200 outline-none">
                        <option value="bKash">bKash</option>
                        <option value="Nagad">Nagad</option>
                    </select>
                    <input type="number" id="payNumber" required class="w-2/3 p-3 rounded-xl border-2 border-yellow-200 outline-none" placeholder="পেমেন্ট নম্বর">
                </div>

                <select id="messageList" class="w-full p-3 rounded-xl border-2 border-yellow-200 outline-none text-sm">
                    <option value="সালামি না দিলে কিন্তু বন্ধুত্ব শেষ 😜">সালামি না দিলে কিন্তু বন্ধুত্ব শেষ 😜</option>
                    <option value="আপনার সালামির অপেক্ষায় বসে আছি 😆">আপনার সালামির অপেক্ষায় বসে আছি 😆</option>
                    <option value="একটা ছোট্ট সালামি দিলে ঈদটা জমে যাবে 😍">একটা ছোট্ট সালামি দিলে ঈদটা জমে যাবে 😍</option>
                </select>

                <button type="submit" class="w-full btn-gradient text-white font-bold py-4 rounded-xl text-lg uppercase shadow-lg">ম্যাজিক লিংক তৈরি করুন ✨</button>
            </form>
        </div>

        <div id="resultSection" class="glass-card p-6 hidden-section text-center">
            <div id="visitorDisplay">
                <img id="displayImg" src="" class="w-32 h-32 rounded-full border-4 border-yellow-400 object-cover mx-auto shadow-xl mb-4">
                
                <h2 class="text-2xl font-bold text-indigo-900 mb-2"><span id="displayName"></span> এর সালামি আবদার!</h2>
                
                <div class="bg-yellow-100 p-4 rounded-2xl italic mb-6 border-2 border-dashed border-yellow-500">
                    "<span id="displayMsgText"></span>"
                </div>

                <div class="bg-gradient-to-r from-pink-50 to-red-50 p-5 rounded-2xl border border-pink-200 mb-6">
                    <p class="text-xs font-bold text-pink-500 mb-1 uppercase tracking-widest">Send Money To (<span id="displayPayType"></span>)</p>
                    <p class="text-2xl font-black text-gray-800" id="displayPayNum"></p>
                </div>

                <div id="container-b5662ff1d1603e73ba82848872d95bbc"></div>
            </div>

            <div id="shareArea" class="hidden-section border-t mt-6 pt-6">
                <p class="text-xs font-bold text-gray-400 mb-3 uppercase">নিচের লিংকটি শেয়ার করুন</p>
                <div class="flex items-center gap-2 mb-4">
                    <input type="text" id="finalLink" readonly class="flex-1 p-2 bg-gray-100 rounded-lg text-xs outline-none">
                    <button onclick="copyLink()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm">Copy</button>
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="shareSocial('whatsapp')" class="bg-green-500 text-white p-3 rounded-xl font-bold flex items-center justify-center gap-2">WhatsApp</button>
                    <button onclick="shareSocial('messenger')" class="bg-blue-600 text-white p-3 rounded-xl font-bold flex items-center justify-center gap-2">Messenger</button>
                </div>
            </div>

            <button onclick="location.href=location.pathname" class="mt-8 text-sm text-gray-500 font-bold block w-full text-center hover:text-yellow-600">আপনিও একটি লিংক বানান ➜</button>
        </div>

        <div class="mt-10">
            <script async="async" data-cfasync="false" src="https://sturgeonvelocity.com/b5662ff1d1603e73ba82848872d95bbc/invoke.js"></script>
        </div>
    </div>

    <script>
        // Link Shortening using Base64
        function encodeData(data) {
            return btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        }

        function decodeData(str) {
            try {
                return JSON.parse(decodeURIComponent(escape(atob(str))));
            } catch(e) { return null; }
        }

        const form = document.getElementById('salamiForm');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const userData = {
                n: document.getElementById('userName').value,
                p: document.getElementById('userPhoto').value || 'https://i.imgur.com/8K07S6K.png',
                t: document.getElementById('paymentType').value,
                m: document.getElementById('payNumber').value,
                s: document.getElementById('messageList').value
            };

            const shortToken = encodeData(userData);
            const shortUrl = window.location.origin + window.location.pathname + '?id=' + shortToken;
            
            document.getElementById('finalLink').value = shortUrl;
            document.getElementById('generatorSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('shareArea').style.display = 'block';
            
            updateUI(userData);
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
        });

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if(id) {
                const data = decodeData(id);
                if(data) {
                    document.getElementById('generatorSection').style.display = 'none';
                    document.getElementById('resultSection').style.display = 'block';
                    updateUI(data);
                    setTimeout(() => {
                        confetti({ particleCount: 150, spread: 70, colors: ['#FFD700', '#FF0000', '#FFFFFF'] });
                    }, 500);
                }
            }
        };

        function updateUI(data) {
            document.getElementById('displayName').innerText = data.n;
            document.getElementById('displayImg').src = data.p;
            document.getElementById('displayPayType').innerText = data.t;
            document.getElementById('displayPayNum').innerText = data.m;
            document.getElementById('displayMsgText').innerText = data.s;
        }

        function copyLink() {
            const linkInput = document.getElementById('finalLink');
            linkInput.select();
            document.execCommand('copy');
            alert('লিংক কপি হয়েছে! এবার বন্ধুদের পাঠান।');
        }

        function shareSocial(p) {
            const url = encodeURIComponent(document.getElementById('finalLink').value);
            const txt = encodeURIComponent("আমার ঈদের সালামি কই? 😍 ");
            if(p === 'whatsapp') window.open(`https://api.whatsapp.com/send?text=${txt}${url}`);
            else window.open(`https://www.facebook.com/dialog/send?link=${url}&app_id=291494419107518&redirect_uri=${url}`);
        }
    </script>
</body>
</html>
