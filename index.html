```html
<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eid Salami Link</title>

<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Hind Siliguri',sans-serif;
background:url("https://images.unsplash.com/photo-1591608513299-1b7f74c3a12b") center/cover no-repeat fixed;
color:white;
text-align:center;
}

.container{
max-width:420px;
margin:auto;
padding:20px;
background:rgba(0,0,0,.6);
border-radius:15px;
margin-top:40px;
}

.title{
font-size:28px;
color:#FFD700;
}

input,select,textarea{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:#FFD700;
font-weight:bold;
cursor:pointer;
}

.copy{background:#ff9800;color:white;}
.share{background:#25D366;color:white;}

.photo{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-top:10px;
}

.numberCard{
background:#ffffff20;
padding:12px;
border-radius:10px;
margin:10px 0;
}

.money{
position:fixed;
top:-20px;
font-size:22px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px);}
100%{transform:translateY(110vh);}
}

</style>
</head>

<body>

<div class="container" id="main">

<h2 class="title">🌙 Eid Salami Link</h2>

<input id="name" placeholder="আপনার নাম">

<input id="number" placeholder="bKash / Nagad নাম্বার">

<select id="method">
<option>bKash</option>
<option>Nagad</option>
</select>

<input type="file" id="photo">

<textarea id="msg" placeholder="Eid message"></textarea>

<button onclick="generate()">🎉 Link Generate</button>

<div id="result"></div>

</div>

<script>

let generatedLink="";

function generate(){

let name=document.getElementById("name").value;
let number=document.getElementById("number").value;
let method=document.getElementById("method").value;
let msg=document.getElementById("msg").value;
let photo=document.getElementById("photo").files[0];

if(!name || !number){
alert("নাম এবং নাম্বার দিন");
return;
}

let reader=new FileReader();

reader.onload=function(){

let data=btoa(name+"|"+method+"|"+number+"|"+msg+"|"+reader.result);

generatedLink=location.origin+location.pathname+"?d="+data;

document.getElementById("result").innerHTML=`

<div style="background:#00000080;padding:10px;border-radius:8px">
${generatedLink}
</div>

<button class="copy" onclick="copyLink()">Copy Link</button>
<button class="share" onclick="share()">WhatsApp Share</button>

`;

}

if(photo){reader.readAsDataURL(photo)}

}

function copyLink(){
navigator.clipboard.writeText(generatedLink);
alert("Link Copied");
}

function share(){

let text="আজ ঈদের দিন 😍\n"+
"ভালবাসা ও সালাম নিন ❤️\n\n"+
"আর হ্যাঁ… সালামি না দিলে কিন্তু মন খারাপ করে ফেলবো 😜\n\n"+
"এইখানে পাঠাতে পারেন 👇\n\n"+
generatedLink;

window.open("https://wa.me/?text="+encodeURIComponent(text));

}

function loadData(){

let p=new URLSearchParams(location.search).get("d");

if(!p)return;

let d=atob(p).split("|");

document.getElementById("main").innerHTML=`

<img src="${d[4]}" class="photo">

<h2>${d[0]}</h2>

<p>${d[3]}</p>

<div class="numberCard">

💸 Salami পাঠান (${d[1]})

<br><br>

${d[2]}

</div>

`;

}

loadData();

function money(){

let m=document.createElement("div");

m.className="money";

m.style.left=Math.random()*100+"%";

m.innerHTML="💸";

document.body.appendChild(m);

setTimeout(()=>{m.remove()},6000)

}

setInterval(money,800);

</script>

</body>
</html>
